<div class="detalle-card">
  <div class="detalle-header">
    <button class="btn-cerrar" (click)="onCerrar()" title="Cerrar detalle">✕</button>
    <h2>Detalle de usuario</h2>
  </div>

  <div class="detalle-body">
    <div class="avatar-section">
      <img [src]="usuario.avatar_url" [alt]="usuario.login" class="avatar-grande" />
      <span class="tipo-badge" [class.admin]="usuario.site_admin">
        {{ usuario.site_admin ? 'Admin' : usuario.type }}
      </span>
    </div>

    <div class="info-section">
      <h3 class="nombre">{{ usuario.login }}</h3>
      <p class="id-usuario">ID: {{ usuario.id }}</p>

      <div class="campo">
        <span class="label">Tipo</span>
        <span class="valor">{{ usuario.type }}</span>
      </div>
      <div class="campo">
        <span class="label">Administrador del sitio</span>
        <span class="valor">{{ usuario.site_admin ? 'Sí' : 'No' }}</span>
      </div>
      <div class="campo">
        <span class="label">Perfil en GitHub</span>
        <a [href]="usuario.html_url" target="_blank" rel="noopener" class="link-github">
          {{ usuario.html_url }}
        </a>
      </div>
    </div>
  </div>
</div>
