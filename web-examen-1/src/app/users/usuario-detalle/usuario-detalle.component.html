<div class="detalle-card">
  <div class="detalle-header">
    <button class="btn-cerrar" (click)="onCerrar()" title="Cerrar detalle">✕</button>
    <h2>Detalle de usuario</h2>
  </div>

  <div class="detalle-body">
    <div class="avatar-section">
      <img [src]="usuario.avatarUrl" [alt]="usuario.username" class="avatar-grande" />
      <span class="tipo-badge" [class.admin]="usuario.role === 'admin'">
        {{ usuario.role }}
      </span>
    </div>

    <div class="info-section">
      <h3 class="nombre">{{ usuario.name }}</h3>
      <p class="id-usuario">ID: {{ usuario.id }}</p>

      <div class="campo">
        <span class="label">Usuario</span>
        <span class="valor">{{ usuario.username }}</span>
      </div>
      <div class="campo">
        <span class="label">Email</span>
        <span class="valor">{{ usuario.email }}</span>
      </div>
      <div class="campo">
        <span class="label">Rol</span>
        <span class="valor">{{ usuario.role }}</span>
      </div>
      <div class="campo">
        <span class="label">Ubicación</span>
        <span class="valor">{{ usuario.location }}</span>
      </div>
    </div>
  </div>
</div>
